name: Live Proxmox E2E

on:
  workflow_dispatch:

jobs:
  live-e2e:
    runs-on: [self-hosted, proxmox-e2e]
    timeout-minutes: 120
    env:
      PROXMOX_URL: ${{ secrets.PROXMOX_BOOTSTRAP_URL }}
      PROXMOX_API_TOKEN_ID: ${{ secrets.PROXMOX_BOOTSTRAP_TOKEN_ID }}
      PROXMOX_API_TOKEN_SECRET: ${{ secrets.PROXMOX_BOOTSTRAP_TOKEN_SECRET }}
      PROXMOX_CI_FQDN: ${{ secrets.PROXMOX_CI_FQDN }}
      PROXMOX_CI_ROOT_PASSWORD: ${{ secrets.PROXMOX_CI_ROOT_PASSWORD }}
      PROXMOX_CI_CLOUDFLARED_TOKEN: ${{ secrets.PROXMOX_CI_CLOUDFLARED_TOKEN }}
      PROXMOX_CI_CIDR: ${{ secrets.PROXMOX_CI_CIDR }}
      PROXMOX_CI_DNS: ${{ secrets.PROXMOX_CI_DNS }}
      PROXMOX_CI_GATEWAY: ${{ secrets.PROXMOX_CI_GATEWAY }}
      PROXMOX_CI_URL: https://${{ secrets.PROXMOX_CI_ADDRESS }}:8006
      PROXMOX_CI_NODE: proxmox
      PROXMOX_CI_ISO_STORAGE: local
      PROXMOX_CI_VM_STORAGE: vault-vm
      PROXMOX_CI_VM_NAME: alchemy-proxmox-ci
      PROXMOX_CI_SOURCE_ISO_URL: https://download.proxmox.com/iso/proxmox-ve_9.1-1.iso
      PROXMOX_CI_SOURCE_ISO_SHA256: 6d8f5afc78c0c66812d7272cde7c8b98be7eb54401ceb045400db05eb5ae6d22
      PROXMOX_CI_ASSET_DIR: .generated/proxmox-ci
      PROXMOX_CI_AUTO_ISO_PATH: .generated/proxmox-ci/proxmox-ve-auto.iso
      PROXMOX_CI_AUTO_ISO_FILENAME: alchemy-proxmox-ci-auto.iso
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

      - name: Render unattended install assets
        run: npm run render:ci-assets

      - name: Prepare Proxmox automated installer ISO
        run: |
          set -euo pipefail
          docker run --rm \
            -e PROXMOX_CI_SOURCE_ISO_URL \
            -e PROXMOX_CI_SOURCE_ISO_SHA256 \
            -e PROXMOX_CI_ASSET_DIR \
            -e PROXMOX_CI_AUTO_ISO_PATH \
            -v "$PWD:/work" \
            -w /work \
            debian:trixie \
            sh -eu -c '
              apt-get update
              apt-get install -y ca-certificates curl xorriso
              curl -fsSL https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg \
                -o /usr/share/keyrings/proxmox-archive-keyring.gpg
              printf "%s\n" \
                "Types: deb" \
                "URIs: http://download.proxmox.com/debian/pve" \
                "Suites: trixie" \
                "Components: pve-no-subscription" \
                "Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg" \
                >/etc/apt/sources.list.d/proxmox.sources
              apt-get update
              apt-get install -y proxmox-auto-install-assistant
              curl -fkSL "$PROXMOX_CI_SOURCE_ISO_URL" -o "$PROXMOX_CI_ASSET_DIR/proxmox-ve.iso"
              echo "$PROXMOX_CI_SOURCE_ISO_SHA256  $PROXMOX_CI_ASSET_DIR/proxmox-ve.iso" | sha256sum -c -
              proxmox-auto-install-assistant validate-answer "$PROXMOX_CI_ASSET_DIR/answer.toml"
              proxmox-auto-install-assistant prepare-iso \
                "$PROXMOX_CI_ASSET_DIR/proxmox-ve.iso" \
                --fetch-from iso \
                --answer-file "$PROXMOX_CI_ASSET_DIR/answer.toml" \
                --on-first-boot "$PROXMOX_CI_ASSET_DIR/first-boot.sh" \
                --output "$PROXMOX_CI_AUTO_ISO_PATH"
            '

      - name: Deploy nested Proxmox CI host
        run: npm run deploy:ci-host

      - name: Wait for nested Proxmox API
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            if curl -kfsS "$PROXMOX_CI_URL/api2/json/version" >/dev/null; then
              exit 0
            fi
            sleep 20
          done
          echo "Nested Proxmox API did not become ready in time" >&2
          exit 1

      - name: Discover nested Proxmox E2E defaults
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from "node:fs/promises";

          const baseUrl = process.env.PROXMOX_CI_URL.replace(/\/+$/, "");
          const auth = await fetch(`${baseUrl}/api2/json/access/ticket`, {
            method: "POST",
            headers: { "content-type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
              username: "root@pam",
              password: process.env.PROXMOX_CI_ROOT_PASSWORD,
            }),
          });
          if (!auth.ok) throw new Error(await auth.text());
          const ticket = (await auth.json()).data.ticket;
          const headers = { cookie: `PVEAuthCookie=${ticket}` };

          const nodes = await get("/nodes");
          const node = nodes[0]?.node ?? "pve";
          const templates = await get(`/nodes/${node}/storage/local/content`, {
            content: "vztmpl",
          });
          const template = templates.find((item) =>
            item.volid?.includes("debian-"),
          )?.volid;
          if (!template) {
            throw new Error("No Debian container template found on nested Proxmox local storage");
          }

          await appendFile(
            process.env.GITHUB_ENV,
            `PROXMOX_E2E_NODE=${node}\nPROXMOX_E2E_LXC_TEMPLATE=${template}\n`,
          );

          async function get(path, query = {}) {
            const url = new URL(`${baseUrl}/api2/json${path}`);
            for (const [key, value] of Object.entries(query)) {
              url.searchParams.set(key, value);
            }
            const response = await fetch(url, { headers });
            if (!response.ok) throw new Error(await response.text());
            return (await response.json()).data;
          }
          EOF

      - name: Run live E2E against nested Proxmox
        env:
          PROXMOX_URL: ${{ env.PROXMOX_CI_URL }}
          PROXMOX_USERNAME: root
          PROXMOX_PASSWORD: ${{ secrets.PROXMOX_CI_ROOT_PASSWORD }}
          PROXMOX_REALM: pam
          PROXMOX_E2E_ISO_STORAGE: local
          PROXMOX_E2E_VM_STORAGE: local-lvm
          PROXMOX_E2E_LXC_STORAGE: local-lvm
          PROXMOX_E2E_LXC_PASSWORD: ${{ secrets.PROXMOX_CI_E2E_LXC_PASSWORD }}
        run: npm run test:e2e

      - name: Destroy nested Proxmox CI host
        if: always()
        run: npm run destroy:ci-host
